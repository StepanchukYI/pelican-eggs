name: build gravit-java25

on:
  push:
    branches: [main]
    paths:
      - 'docker/gravit-java25/**'
      - '.github/workflows/build-gravit-java25.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker/gravit-java25
          file: ./docker/gravit-java25/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/stepanchukyi/pelican-eggs:gravit-java25
            ghcr.io/stepanchukyi/pelican-eggs:gravit-java25-${{ github.sha }}
